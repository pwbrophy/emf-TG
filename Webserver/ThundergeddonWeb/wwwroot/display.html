<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thundergeddon Display</title>
<script src="https://unpkg.com/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --blue:   #4a9eff;
    --red:    #ff6b35;
    --bg:     #0d0d0d;
    --panel:  #1a1a1a;
    --border: #2a2a2a;
    --text:   #e8e8e8;
    --dim:    #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; overflow: hidden; }

  /* ── LAYOUT ────────────────────────────────────────────────────── */
  #app { display: flex; flex-direction: column; height: 100vh; padding: 12px; gap: 10px; }

  /* Header */
  #header { display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border-radius: 8px; padding: 10px 20px; flex-shrink: 0; }
  #title { font-size: 1.8em; font-weight: 900; letter-spacing: 2px;
    text-transform: uppercase; color: #fff; }
  #title span { color: #f0c040; }
  #timer { font-size: 2.4em; font-weight: 700; font-variant-numeric: tabular-nums;
    color: #fff; min-width: 90px; text-align: right; }
  #mute-btn { background: none; border: 1px solid #444; border-radius: 6px;
    color: #ccc; font-size: 1.2em; cursor: pointer; padding: 4px 8px; margin-left: 12px; }
  #mute-btn:hover { border-color: #888; color: #fff; }
  #timer.urgent { color: #ff4444; animation: flash 0.5s infinite alternate; }
  @keyframes flash { from { opacity: 1; } to { opacity: 0.3; } }

  /* Team points bar */
  #teambar-wrap { background: var(--panel); border-radius: 8px; padding: 10px 16px; flex-shrink: 0; }
  #teambar-labels { display: flex; justify-content: space-between; margin-bottom: 6px;
    font-size: 0.85em; font-weight: 700; }
  #tp-label-0 { color: var(--blue); }
  #tp-label-1 { color: var(--red); text-align: right; }
  #teambar-track { position: relative; height: 24px; background: #111; border-radius: 12px; overflow: hidden; }
  #teambar-fill-0 { position: absolute; left: 0; top: 0; height: 100%; background: var(--blue);
    transition: width 0.4s ease; }
  #teambar-fill-1 { position: absolute; right: 0; top: 0; height: 100%; background: var(--red);
    transition: width 0.4s ease; }
  #teambar-centre { position: absolute; left: 50%; top: 0; width: 3px; height: 100%;
    background: #fff; transform: translateX(-50%); z-index: 1; }

  /* Event log */
  #eventlog { background: var(--panel); border-radius: 8px; padding: 10px 16px; flex-shrink: 0;
    min-height: 80px; }
  .event-line { font-size: 0.95em; color: #ccc; padding: 2px 0; border-bottom: 1px solid var(--border); }
  .event-line:last-child { border-bottom: none; }
  .event-line.newest { color: #fff; font-weight: 600; }

  /* Two-column area */
  #columns { display: flex; gap: 10px; flex: 1; min-height: 0; }
  #col-alliances { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  #col-capture { width: 180px; display: flex; flex-direction: column; gap: 8px;
    justify-content: space-around; }

  /* Alliance sections */
  .alliance-block { background: var(--panel); border-radius: 8px; padding: 10px 14px; }
  .alliance-title { font-size: 0.8em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px; }
  .alliance-title.a0 { color: var(--blue); }
  .alliance-title.a1 { color: var(--red); }
  .robot-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
  .robot-callsign { font-size: 0.85em; color: var(--dim); width: 90px; flex-shrink: 0; }
  .robot-player { font-size: 0.9em; font-weight: 600; width: 80px; flex-shrink: 0; }
  .hp-bar-wrap { flex: 1; height: 14px; background: #111; border-radius: 7px; overflow: hidden; }
  .hp-bar { height: 100%; border-radius: 7px; transition: width 0.3s ease; }
  .hp-bar.a0 { background: var(--blue); }
  .hp-bar.a1 { background: var(--red); }
  .hp-num { font-size: 0.8em; color: var(--dim); width: 36px; text-align: right; flex-shrink: 0; }
  .robot-row.dead .robot-player,
  .robot-row.dead .robot-callsign { opacity: 0.35; text-decoration: line-through; }
  .robot-row.dead .hp-bar { background: #444; }

  /* Capture points */
  .cp-block { display: flex; flex-direction: column; align-items: center;
    gap: 6px; flex: 1; justify-content: center; }
  .cp-circle { width: 72px; height: 72px; border-radius: 50%; background: #333;
    border: 3px solid #555; transition: background 0.4s, border-color 0.4s; }
  .cp-circle.owner-0 { background: var(--blue); border-color: var(--blue); }
  .cp-circle.owner-1 { background: var(--red);  border-color: var(--red); }
  .cp-label { font-size: 0.75em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--dim); }

  /* Lobby overlay */
  #lobby-overlay { position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 40px 24px; gap: 20px; z-index: 10; }
  #lobby-overlay.hidden { display: none; }
  #lobby-title { font-size: 2.5em; font-weight: 900; letter-spacing: 4px;
    text-transform: uppercase; color: #fff; }
  #lobby-title span { color: #f0c040; }
  #lobby-waiting { font-size: 1.4em; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; }
  #lobby-alliances { display: flex; gap: 60px; }
  .lobby-team { text-align: center; }
  .lobby-team-title { font-size: 0.85em; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px; }
  .lobby-team-title.a0 { color: var(--blue); }
  .lobby-team-title.a1 { color: var(--red); }
  .lobby-player-name { font-size: 1.05em; padding: 3px 0; }
  #qr-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #qr-label-top { font-size: 1em; color: #ccc; letter-spacing: 1px; }
  #qr-code { background: #fff; padding: 12px; border-radius: 8px; }
  #qr-slots { font-size: 0.9em; color: var(--dim); }

  /* Game paused overlay */
  #paused-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 30; pointer-events: none; }
  #paused-overlay.hidden { display: none; }
  #paused-title { font-size: 4em; font-weight: 900; letter-spacing: 8px;
    text-transform: uppercase; color: #f0c040; text-shadow: 0 0 40px #f0c040; }
  #paused-sub { font-size: 1.1em; color: #ccc; letter-spacing: 2px; text-transform: uppercase; }

  /* Connection banner */
  #status-banner { position: fixed; bottom: 10px; right: 10px; background: #222;
    color: #888; font-size: 0.75em; padding: 4px 10px; border-radius: 4px; z-index: 20; }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div id="title">&#9889; <span>THUNDERGEDDON</span></div>
    <div id="timer">--:--</div>
    <button id="mute-btn" onclick="toggleMute()" title="Toggle announcer">&#128266;</button>
  </div>

  <!-- Team points bar -->
  <div id="teambar-wrap">
    <div id="teambar-labels">
      <span id="tp-label-0">Alliance 1 — 0 pts</span>
      <span id="tp-label-1">0 pts — Alliance 2</span>
    </div>
    <div id="teambar-track">
      <div id="teambar-fill-0" style="width:0%"></div>
      <div id="teambar-fill-1" style="width:0%"></div>
      <div id="teambar-centre"></div>
    </div>
  </div>

  <!-- Event log -->
  <div id="eventlog">
    <div class="event-line dim" id="evt-placeholder">Waiting for action&hellip;</div>
  </div>

  <!-- Two columns -->
  <div id="columns">
    <div id="col-alliances"></div>
    <div id="col-capture">
      <div class="cp-block">
        <div class="cp-circle" id="cp-0"></div>
        <div class="cp-label">North</div>
      </div>
      <div class="cp-block">
        <div class="cp-circle" id="cp-1"></div>
        <div class="cp-label">Centre</div>
      </div>
      <div class="cp-block">
        <div class="cp-circle" id="cp-2"></div>
        <div class="cp-label">South</div>
      </div>
    </div>
  </div>
</div>

<!-- Lobby overlay -->
<div id="lobby-overlay">
  <div id="lobby-title">&#9889; <span>THUNDERGEDDON</span></div>
  <div id="lobby-waiting">Waiting to Start</div>
  <div id="lobby-alliances">
    <div class="lobby-team">
      <div class="lobby-team-title a0">Alliance 1</div>
      <div id="lobby-team-0"></div>
    </div>
    <div class="lobby-team">
      <div class="lobby-team-title a1">Alliance 2</div>
      <div id="lobby-team-1"></div>
    </div>
  </div>
  <div id="qr-section">
    <div id="qr-label-top">Scan QR to join the next game</div>
    <div id="qr-code"></div>
    <div id="qr-slots">— / — slots available</div>
  </div>
</div>

<div id="paused-overlay" class="hidden">
  <div id="paused-title">&#9646;&#9646; PAUSED</div>
  <div id="paused-sub">Game paused by operator</div>
</div>

<div id="status-banner">Connecting&hellip;</div>

<script>
// ── QR code (points to the server's LAN IP so phones can scan and connect) ──
let qrInstance = null;

function buildQr(url) {
  const el = document.getElementById('qr-code');
  el.innerHTML = '';
  qrInstance = new QRCode(el, {
    text: url,
    width: 200, height: 200,
    colorDark: '#000000', colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

// Start with origin as placeholder, then replace with real LAN IP
buildQr(window.location.origin);

fetch('/api/serverip')
  .then(r => r.json())
  .then(data => { if (data.url) buildQr(data.url); })
  .catch(() => { /* keep placeholder if fetch fails */ });

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  phase: 'mainmenu',
  timer: 0,
  playerCount: 0,
  maxPlayers: 6,
  teamPoints: [0, 0],
  maxTeamPoints: 300,
  robots: [],
  capturePoints: [{ name:'North', owner:-1 }, { name:'Centre', owner:-1 }, { name:'South', owner:-1 }]
};
let eventLines = [];

// ── SignalR connection ────────────────────────────────────────────────────
const conn = new signalR.HubConnectionBuilder()
  .withUrl('/gamehub')
  .withAutomaticReconnect({ nextRetryDelayInMilliseconds: () => 3000 })
  .build();

conn.on('DisplayUpdate', rawJson => {
  try {
    const data = (typeof rawJson === 'string') ? JSON.parse(rawJson) : rawJson;
    applyDisplayUpdate(data);
  } catch(e) { console.error('DisplayUpdate parse error', e); }
});

conn.on('DisplayEvent', text => {
  addEvent(text);
  speak(text);
});

conn.on('GameOver', data => {
  const msg = data.winnerTeam
    ? `${data.winnerTeam} wins!`
    : `Game over!`;
  addEvent(msg);
  speak(msg);
});

conn.on('GamePaused',  () => {
  document.getElementById('paused-overlay').classList.remove('hidden');
  speak('Game paused');
});
conn.on('GameResumed', () => {
  document.getElementById('paused-overlay').classList.add('hidden');
  speak('Game resumed');
});

conn.onreconnecting(() => setBanner('Reconnecting…'));
conn.onreconnected(() => setBanner('Connected'));
conn.onclose(() => setBanner('Disconnected — refresh to reconnect'));

async function startConnection() {
  try {
    await conn.start();
    setBanner('Connected');
    // Do NOT call JoinLobby — display page is read-only
  } catch(e) {
    setBanner('Connection failed — retrying…');
    setTimeout(startConnection, 3000);
  }
}
startConnection();

// ── Apply state update ────────────────────────────────────────────────────
function applyDisplayUpdate(data) {
  state = Object.assign(state, data);
  document.getElementById('paused-overlay')
    .classList.toggle('hidden', !state.paused);
  render();
}

function addEvent(text) {
  eventLines.unshift(text);
  if (eventLines.length > 4) eventLines.length = 4;
  renderEventLog();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  renderLobbyOverlay();
  renderTimer();
  renderTeamBar();
  renderAlliances();
  renderCapturePoints();
}

function renderLobbyOverlay() {
  const isLobby = (state.phase === 'lobby' || state.phase === 'mainmenu');
  const el = document.getElementById('lobby-overlay');
  el.classList.toggle('hidden', !isLobby);

  if (!isLobby) return;

  const avail = state.maxPlayers - state.playerCount;
  document.getElementById('qr-slots').textContent =
    `${avail} / ${state.maxPlayers} slots available`;

  // Build per-alliance player lists from robots
  const t0 = document.getElementById('lobby-team-0');
  const t1 = document.getElementById('lobby-team-1');
  t0.innerHTML = ''; t1.innerHTML = '';
  (state.robots || []).forEach(r => {
    const div = document.createElement('div');
    div.className = 'lobby-player-name';
    div.textContent = r.player || r.callsign || '?';
    (r.alliance === 0 ? t0 : t1).appendChild(div);
  });
}

function renderTimer() {
  const el = document.getElementById('timer');
  const s  = Math.ceil(state.timer);
  const m  = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  el.textContent = (state.phase === 'playing') ? `${m}:${ss}` : '--:--';
  el.classList.toggle('urgent', state.phase === 'playing' && s <= 10 && s > 0);
}

function renderTeamBar() {
  const tp  = state.teamPoints || [0, 0];
  const max = state.maxTeamPoints || 300;
  const total = tp[0] + tp[1];

  // Each side fills inward from its edge, based on its share of points
  const w0 = Math.min(50, (tp[0] / max) * 100);
  const w1 = Math.min(50, (tp[1] / max) * 100);

  document.getElementById('teambar-fill-0').style.width = w0 + '%';
  document.getElementById('teambar-fill-1').style.width = w1 + '%';
  document.getElementById('tp-label-0').textContent = `Alliance 1 — ${tp[0]} pts`;
  document.getElementById('tp-label-1').textContent = `${tp[1]} pts — Alliance 2`;
}

function renderEventLog() {
  const el = document.getElementById('eventlog');
  if (eventLines.length === 0) {
    el.innerHTML = '<div class="event-line" style="color:#555">Waiting for action…</div>';
    return;
  }
  el.innerHTML = eventLines.map((t, i) =>
    `<div class="event-line${i === 0 ? ' newest' : ''}">${escHtml(t)}</div>`
  ).join('');
}

function renderAlliances() {
  const col = document.getElementById('col-alliances');
  col.innerHTML = '';

  const byAlliance = [[], []];
  (state.robots || []).forEach(r => {
    const a = (r.alliance === 0 || r.alliance === 1) ? r.alliance : 0;
    byAlliance[a].push(r);
  });

  [0, 1].forEach(a => {
    if (byAlliance[a].length === 0) return;
    const block = document.createElement('div');
    block.className = 'alliance-block';
    block.innerHTML = `<div class="alliance-title a${a}">Alliance ${a + 1}</div>`;

    byAlliance[a].forEach(r => {
      const pct = Math.max(0, Math.min(100, (r.hp / (r.maxHp || 100)) * 100));
      const row = document.createElement('div');
      row.className = 'robot-row' + (r.dead ? ' dead' : '');
      row.innerHTML =
        `<span class="robot-callsign">${escHtml(r.callsign || '')}</span>` +
        `<span class="robot-player">${escHtml(r.player || '—')}</span>` +
        `<div class="hp-bar-wrap"><div class="hp-bar a${a}" style="width:${pct}%"></div></div>` +
        `<span class="hp-num">${r.dead ? 'DEAD' : r.hp}</span>`;
      block.appendChild(row);
    });
    col.appendChild(block);
  });
}

function renderCapturePoints() {
  const pts = state.capturePoints || [];
  for (let i = 0; i < 3; i++) {
    const circle = document.getElementById('cp-' + i);
    if (!circle) continue;
    const owner = pts[i] ? pts[i].owner : -1;
    circle.className = 'cp-circle' + (owner >= 0 ? ` owner-${owner}` : '');
  }
}

// ── Text-to-speech announcer ──────────────────────────────────────────────
let _muted = false;

function speak(text) {
  if (_muted || !window.speechSynthesis) return;
  speechSynthesis.cancel(); // don't queue — latest event wins
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 0.95; // slightly slower for announcer feel
  utt.pitch = 1.0;
  speechSynthesis.speak(utt);
}

function toggleMute() {
  _muted = !_muted;
  if (_muted) speechSynthesis.cancel();
  document.getElementById('mute-btn').textContent = _muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
}

// ── Helpers ───────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setBanner(msg) {
  document.getElementById('status-banner').textContent = msg;
}

// Initial render
render();
</script>
</body>
</html>
