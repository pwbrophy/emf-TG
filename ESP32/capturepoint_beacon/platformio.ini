[env:capturepoint_beacon]
platform = espressif32 @ ^6.9.0   ; Arduino 3.x, ESP-IDF 5.x
; Same module spec as the robot boards: 4D Systems GEN4-ESP32-S3R8N16
; (ESP32-S3-WROOM-1U-N16R8: 16 MB QIO flash, 8 MB OPI PSRAM). Beacons don't
; touch PSRAM/camera, but this keeps the bootloader/partition table matched
; to the actual chip.
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3
    ; Pinned to 0.5.4 (commit 26eecea) - matches the anchor line in
    ; scripts/patch_websockets.py. Do not bump without re-verifying the patch.
    https://github.com/gilmaimon/ArduinoWebsockets.git#26eecea6d3d38224d1ee9c354cffa2eae50c786f
    bblanchon/ArduinoJson @ ^7.2.0

; Auto-applies the WebSocket Host-header patch (see scripts/patch_websockets.py).
; Inherited by every env below via `extends`.
extra_scripts =
    pre:scripts/patch_websockets.py

build_flags =
    -std=gnu++17

monitor_speed  = 115200
upload_speed   = 921600

; --- Per-point builds (initial serial flash — no upload_port set) -----------
; Point index is baked in at build time since it can't be inferred from MAC.

[env:capturepoint_beacon_north]
extends     = env:capturepoint_beacon
build_flags = ${env:capturepoint_beacon.build_flags} -D POINT_INDEX=0 -D POINT_NAME=\"North\"

[env:capturepoint_beacon_centre]
extends     = env:capturepoint_beacon
build_flags = ${env:capturepoint_beacon.build_flags} -D POINT_INDEX=1 -D POINT_NAME=\"Centre\"

[env:capturepoint_beacon_south]
extends     = env:capturepoint_beacon
build_flags = ${env:capturepoint_beacon.build_flags} -D POINT_INDEX=2 -D POINT_NAME=\"South\"

; --- OTA envs — BFG network (desktop PC, 192.168.86.x) -----------------------

[env:capturepoint_beacon_north_ota]
extends         = env:capturepoint_beacon_north
upload_protocol = espota
upload_port     = 192.168.86.201
upload_flags    =
    --port=3232
    --auth=thunder123

[env:capturepoint_beacon_centre_ota]
extends         = env:capturepoint_beacon_centre
upload_protocol = espota
upload_port     = 192.168.86.202
upload_flags    =
    --port=3232
    --auth=thunder123

[env:capturepoint_beacon_south_ota]
extends         = env:capturepoint_beacon_south
upload_protocol = espota
upload_port     = 192.168.86.203
upload_flags    =
    --port=3232
    --auth=thunder123

; --- OTA envs — Thundergeddon network (laptop, 192.168.8.x) ------------------

[env:capturepoint_beacon_north_ota_tg]
extends         = env:capturepoint_beacon_north
upload_protocol = espota
upload_port     = 192.168.8.201
upload_flags    =
    --port=3232
    --auth=thunder123

[env:capturepoint_beacon_centre_ota_tg]
extends         = env:capturepoint_beacon_centre
upload_protocol = espota
upload_port     = 192.168.8.202
upload_flags    =
    --port=3232
    --auth=thunder123

[env:capturepoint_beacon_south_ota_tg]
extends         = env:capturepoint_beacon_south
upload_protocol = espota
upload_port     = 192.168.8.203
upload_flags    =
    --port=3232
    --auth=thunder123
