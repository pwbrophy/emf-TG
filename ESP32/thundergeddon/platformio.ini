[env:thundergeddon]
platform = espressif32 @ ^6.9.0   ; Arduino 3.x, ESP-IDF 5.x
; 4D Systems GEN4-ESP32-S3R8N16 board definition matches ESP32-S3-WROOM-1U-N16R8 exactly:
; 16 MB QIO flash, 8 MB OPI PSRAM, qio_opi memory type, correct 16 MB partition table.
; The default esp32-s3-devkitc-1 targets the N8 variant (8 MB, no PSRAM) and produces a
; mismatched bootloader that crashes on this chip.
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3
    https://github.com/gilmaimon/ArduinoWebsockets.git
    bblanchon/ArduinoJson @ ^7.2.0
    https://github.com/espressif/esp32-camera.git

build_flags =
    -std=gnu++17
    -Wno-deprecated-declarations  ; suppress ledcSetup deprecation warnings on newer cores

monitor_speed  = 115200
upload_speed   = 921600

[env:thundergeddon_ota]
extends         = env:thundergeddon
upload_protocol = espota
upload_port     = thunder-9CF218697090.local
upload_flags    =
    --port=3232
    --auth=thunder123
